default: &DEFAULT
  OPENSEARCH_HOST: ${ssm:/production/search-api/default/host}
  OPENSEARCH_MASTER_USERNAME: ${ssm:/production/search-api/default/master-username}
  OPENSEARCH_MASTER_PASSWORD: ${ssm:/production/search-api/default/master-password}
  OPENSEARCH_PORT: 443

# Production environment
production:
  <<: *DEFAULT
  DOMAIN_NAME: search.devicebits.com
  NODE_ENV: production
  LOG_LEVEL: warn

# Staging environment
staging:
  <<: *DEFAULT
  DOMAIN_NAME: search-staging.devicebits.com
  NODE_ENV: staging
  LOG_LEVEL: debug

# Development environment
dev:
  <<: *DEFAULT
  DOMAIN_NAME: search-dev.devicebits.com
  NODE_ENV: development
  LOG_LEVEL: debug

  # NODE_ENV: ${env:NODE_ENV}
  OPENSEARCH_PORT: ${env:OPENSEARCH_PORT}
  OPENSEARCH_HOST: ${env:OPENSEARCH_HOST}
  OPENSEARCH_MASTER_USERNAME: ${env:OPENSEARCH_MASTER_USERNAME}
  OPENSEARCH_MASTER_PASSWORD: ${env:OPENSEARCH_MASTER_PASSWORD}
  # DATABASE_HOST: ${env:DATABASE_HOST}
  # DATABASE_USER: ${env:DATABASE_USER}
  # DATABASE_PASSWORD: ${env:DATABASE_PASSWORD}
  # DATABASE_NAME: ${env:DATABASE_NAME}

default: &DEFAULT
  OPENSEARCH_HOST: ${ssm:/production/search-api/default/host}
  OPENSEARCH_MASTER_USERNAME: ${ssm:/production/search-api/default/master-username}
  OPENSEARCH_MASTER_PASSWORD: ${ssm:/production/search-api/default/master-password}
  OPENSEARCH_PORT: 443
  # Queue backend — always SQS in AWS; local dev overrides via .env to "rabbitmq".
  QUEUE_PROVIDER: ${env:QUEUE_PROVIDER, 'sqs'}
  SQS_QUEUE_URL: ${env:SQS_QUEUE_URL, ''}
  SQS_ENDPOINT: ${env:SQS_ENDPOINT, ''}
  SQS_MAX_MESSAGES: ${env:SQS_MAX_MESSAGES, '10'}
  SQS_WAIT_TIME_SECONDS: ${env:SQS_WAIT_TIME_SECONDS, '20'}
  SQS_VISIBILITY_TIMEOUT: ${env:SQS_VISIBILITY_TIMEOUT, '60'}
  QUEUE_BATCH_SIZE: ${env:QUEUE_BATCH_SIZE, '10'}

# Production environment
production:
  <<: *DEFAULT
  DOMAIN_NAME: search.devicebits.com
  NODE_ENV: production
  LOG_LEVEL: warn

# Staging environment
staging:
  <<: *DEFAULT
  DOMAIN_NAME: search-staging.devicebits.com
  NODE_ENV: staging
  LOG_LEVEL: debug

# Development environment
dev:
  <<: *DEFAULT
  DOMAIN_NAME: search-dev.devicebits.com
  NODE_ENV: development
  LOG_LEVEL: debug
